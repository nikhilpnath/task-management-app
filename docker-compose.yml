services:
  client:
    build:
      context: ./client 
    ports:
      - "5173:5173"
    env_file:
      - ./client/.env
    volumes:
      - ./client:/frontend
      - /frontend/node_modules

  server:
    build: ./server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./server:/backend
      - /backend/node_modules